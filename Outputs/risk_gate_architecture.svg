<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A6F97;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5CB85C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D8B3D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0AD4E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C96C3A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C3483;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#BDC3C7"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1100" height="320" fill="#FAFBFC"/>
  
  <!-- Title -->
  <text x="550" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2C3E50" text-anchor="middle">Risk Gate Pipeline</text>
  <text x="550" y="58" font-family="Arial, sans-serif" font-size="12" fill="#7F8C8D" text-anchor="middle">Calibrated Gradient Boosting for Extraction Uncertainty Scoring</text>
  
  <!-- Step 1: Receipt Input -->
  <g transform="translate(30, 85)">
    <rect x="0" y="0" width="120" height="150" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2" filter="url(#shadow)"/>
    <rect x="10" y="10" width="100" height="75" fill="#F5F5F5" rx="4"/>
    <text x="60" y="32" font-family="monospace" font-size="8" fill="#555" text-anchor="middle">STORE NAME</text>
    <text x="60" y="45" font-family="monospace" font-size="7" fill="#777" text-anchor="middle">123 Main St</text>
    <line x1="15" y1="55" x2="105" y2="55" stroke="#DDD" stroke-width="1"/>
    <text x="18" y="67" font-family="monospace" font-size="6" fill="#777">ITEM 1   $12.99</text>
    <text x="18" y="78" font-family="monospace" font-size="6" fill="#777">TOTAL    $21.49</text>
    <text x="60" y="115" font-family="Arial" font-size="11" fill="#2C3E50" text-anchor="middle" font-weight="bold">Receipt</text>
    <text x="60" y="130" font-family="Arial" font-size="9" fill="#7F8C8D" text-anchor="middle">Document</text>
    <circle cx="0" cy="75" r="14" fill="url(#blueGrad)"/>
    <text x="0" y="79" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">1</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 160 160 L 195 160" stroke="#BDC3C7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: OCR + Boxes -->
  <g transform="translate(205, 85)">
    <rect x="0" y="0" width="120" height="150" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2" filter="url(#shadow)"/>
    <rect x="10" y="12" width="100" height="70" fill="#FFF9E6" rx="4" stroke="#F0AD4E" stroke-width="1"/>
    <rect x="18" y="20" width="60" height="11" fill="none" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="2,1"/>
    <text x="48" y="28" font-family="monospace" font-size="7" fill="#555">STORE</text>
    <rect x="18" y="35" width="80" height="10" fill="none" stroke="#5CB85C" stroke-width="1.5" stroke-dasharray="2,1"/>
    <text x="58" y="43" font-family="monospace" font-size="6" fill="#555">123 Main St</text>
    <rect x="18" y="50" width="45" height="10" fill="none" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="2,1"/>
    <text x="40" y="58" font-family="monospace" font-size="6" fill="#555">$21.49</text>
    <rect x="68" y="50" width="30" height="10" fill="none" stroke="#C96C3A" stroke-width="1.5" stroke-dasharray="2,1"/>
    <text x="83" y="58" font-family="monospace" font-size="6" fill="#555">TOTAL</text>
    <text x="60" y="115" font-family="Arial" font-size="11" fill="#2C3E50" text-anchor="middle" font-weight="bold">OCR Text</text>
    <text x="60" y="130" font-family="Arial" font-size="9" fill="#7F8C8D" text-anchor="middle">+ Bounding Boxes</text>
    <circle cx="0" cy="75" r="14" fill="url(#blueGrad)"/>
    <text x="0" y="79" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">2</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 335 160 L 370 160" stroke="#BDC3C7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: Feature Engineering -->
  <g transform="translate(380, 85)">
    <rect x="0" y="0" width="130" height="150" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2" filter="url(#shadow)"/>
    <text x="65" y="22" font-family="Arial" font-size="11" fill="#2C3E50" text-anchor="middle" font-weight="bold">Feature Vector</text>
    <text x="65" y="38" font-family="Arial" font-size="12" fill="url(#blueGrad)" text-anchor="middle" font-weight="bold">x in R(21)</text>
    
    <g transform="translate(10, 48)">
      <rect x="0" y="0" width="110" height="14" fill="#E8F4FD" rx="3"/>
      <text x="5" y="10" font-family="monospace" font-size="6" fill="#2A6F97">n_tokens, n_boxes</text>
    </g>
    <g transform="translate(10, 65)">
      <rect x="0" y="0" width="110" height="14" fill="#E8F8E8" rx="3"/>
      <text x="5" y="10" font-family="monospace" font-size="6" fill="#3D8B3D">ocr_char_count</text>
    </g>
    <g transform="translate(10, 82)">
      <rect x="0" y="0" width="110" height="14" fill="#FFF3E0" rx="3"/>
      <text x="5" y="10" font-family="monospace" font-size="6" fill="#C96C3A">amount_token_ratio</text>
    </g>
    <g transform="translate(10, 99)">
      <rect x="0" y="0" width="110" height="14" fill="#F3E5F5" rx="3"/>
      <text x="5" y="10" font-family="monospace" font-size="6" fill="#6C3483">has_total_anchor ...</text>
    </g>
    
    <text x="65" y="135" font-family="Arial" font-size="8" fill="#7F8C8D" text-anchor="middle">(21 features)</text>
    <circle cx="0" cy="75" r="14" fill="url(#blueGrad)"/>
    <text x="0" y="79" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">3</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 520 160 L 555 160" stroke="#BDC3C7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Gradient Boosting -->
  <g transform="translate(565, 85)">
    <rect x="0" y="0" width="150" height="150" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2" filter="url(#shadow)"/>
    <text x="75" y="20" font-family="Arial" font-size="11" fill="#2C3E50" text-anchor="middle" font-weight="bold">Gradient Boosting</text>
    
    <!-- Trees visualization -->
    <g transform="translate(15, 30)">
      <g transform="translate(0, 0)">
        <circle cx="18" cy="8" r="7" fill="url(#greenGrad)"/>
        <line x1="13" y1="15" x2="8" y2="28" stroke="#3D8B3D" stroke-width="1.5"/>
        <line x1="23" y1="15" x2="28" y2="28" stroke="#3D8B3D" stroke-width="1.5"/>
        <circle cx="8" cy="32" r="4" fill="#5CB85C"/>
        <circle cx="28" cy="32" r="4" fill="#5CB85C"/>
      </g>
      <g transform="translate(40, 0)">
        <circle cx="18" cy="8" r="7" fill="url(#greenGrad)"/>
        <line x1="13" y1="15" x2="8" y2="28" stroke="#3D8B3D" stroke-width="1.5"/>
        <line x1="23" y1="15" x2="28" y2="28" stroke="#3D8B3D" stroke-width="1.5"/>
        <circle cx="8" cy="32" r="4" fill="#5CB85C"/>
        <circle cx="28" cy="32" r="4" fill="#5CB85C"/>
      </g>
      <g transform="translate(80, 0)">
        <circle cx="18" cy="8" r="7" fill="url(#greenGrad)"/>
        <line x1="13" y1="15" x2="8" y2="28" stroke="#3D8B3D" stroke-width="1.5"/>
        <line x1="23" y1="15" x2="28" y2="28" stroke="#3D8B3D" stroke-width="1.5"/>
        <circle cx="8" cy="32" r="4" fill="#5CB85C"/>
        <circle cx="28" cy="32" r="4" fill="#5CB85C"/>
      </g>
      <text x="60" y="52" font-family="Arial" font-size="8" fill="#7F8C8D" text-anchor="middle">100 trees, depth=4</text>
    </g>
    
    <text x="75" y="95" font-family="Arial" font-size="12" fill="#7F8C8D" text-anchor="middle">+</text>
    
    <rect x="15" y="102" width="120" height="28" rx="5" fill="url(#purpleGrad)"/>
    <text x="75" y="120" font-family="Arial" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Isotonic Calibration</text>
    
    <text x="75" y="145" font-family="Arial" font-size="7" fill="#7F8C8D" text-anchor="middle">CalibratedClassifierCV</text>
    <circle cx="0" cy="75" r="14" fill="url(#blueGrad)"/>
    <text x="0" y="79" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">4</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 725 160 L 760 160" stroke="#BDC3C7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5: Risk Score -->
  <g transform="translate(770, 85)">
    <rect x="0" y="0" width="120" height="150" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2" filter="url(#shadow)"/>
    <text x="60" y="20" font-family="Arial" font-size="11" fill="#2C3E50" text-anchor="middle" font-weight="bold">Risk Score</text>
    
    <rect x="15" y="30" width="90" height="18" rx="4" fill="#ECEFF1"/>
    <rect x="15" y="30" width="63" height="18" rx="4" fill="url(#orangeGrad)"/>
    <text x="60" y="43" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">p = 0.70</text>
    
    <text x="60" y="65" font-family="Times, serif" font-size="10" fill="#2C3E50" text-anchor="middle" font-style="italic">p = P(risk | x)</text>
    
    <line x1="15" y1="75" x2="105" y2="75" stroke="#E0E0E0" stroke-width="1"/>
    
    <g transform="translate(12, 82)">
      <rect x="0" y="0" width="96" height="16" rx="3" fill="#DFF0D8"/>
      <text x="48" y="11" font-family="Arial" font-size="7" fill="#3D8B3D" text-anchor="middle">&lt; 0.30 = auto_accept</text>
    </g>
    <g transform="translate(12, 100)">
      <rect x="0" y="0" width="96" height="16" rx="3" fill="#FCF8E3"/>
      <text x="48" y="11" font-family="Arial" font-size="7" fill="#8A6D3B" text-anchor="middle">0.30-0.60 = review</text>
    </g>
    <g transform="translate(12, 118)">
      <rect x="0" y="0" width="96" height="16" rx="3" fill="#F2DEDE"/>
      <text x="48" y="11" font-family="Arial" font-size="7" fill="#A94442" text-anchor="middle">&gt; 0.60 = human</text>
    </g>
    
    <circle cx="0" cy="75" r="14" fill="url(#blueGrad)"/>
    <text x="0" y="79" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">5</text>
  </g>
  
  <!-- Arrow 5 -->
  <path d="M 900 160 L 935 160" stroke="#BDC3C7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 6: Output -->
  <g transform="translate(945, 90)">
    <rect x="0" y="0" width="120" height="140" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2" filter="url(#shadow)"/>
    <text x="60" y="20" font-family="Arial" font-size="11" fill="#2C3E50" text-anchor="middle" font-weight="bold">JSON Output</text>
    
    <rect x="10" y="30" width="100" height="85" rx="4" fill="#2C3E50"/>
    <text x="15" y="48" font-family="monospace" font-size="8" fill="#E74C3C">{</text>
    <text x="20" y="62" font-family="monospace" font-size="7" fill="#3498DB">"doc_id"</text>
    <text x="58" y="62" font-family="monospace" font-size="7" fill="#ECF0F1">: "..."</text>
    <text x="20" y="76" font-family="monospace" font-size="7" fill="#3498DB">"risk_score"</text>
    <text x="75" y="76" font-family="monospace" font-size="7" fill="#F39C12">: 0.70</text>
    <text x="20" y="90" font-family="monospace" font-size="7" fill="#3498DB">"action"</text>
    <text x="55" y="90" font-family="monospace" font-size="7" fill="#ECF0F1">:</text>
    <text x="22" y="103" font-family="monospace" font-size="7" fill="#2ECC71">"human_required"</text>
    <text x="15" y="113" font-family="monospace" font-size="8" fill="#E74C3C">}</text>
    
    <circle cx="0" cy="70" r="14" fill="url(#greenGrad)"/>
    <text x="0" y="74" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">6</text>
  </g>
  
</svg>